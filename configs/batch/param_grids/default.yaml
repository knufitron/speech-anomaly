# Per-model Cartesian product: each key under `sweep` is a list of options; combined with `base`.
# Supervised: include class_weight (3 values) + up to two more axes (≤3 options each).
# Unsupervised: no class_weight; nu / contamination / n_neighbors etc.

random_forest:
  base:
    n_estimators: 200
    random_state: 42
    n_jobs: -1
  sweep:
    class_weight:
      - balanced
      - {0: 1, 1: 14}
      - {0: 1, 1: 9}
      - {0: 1, 1: 7}
      - {0: 1, 1: 5}
      - {0: 1, 1: 4}
    max_depth: [10, null]
    min_samples_leaf: [1, 2]

logistic_regression:
  base:
    max_iter: 2000
    random_state: 42
    solver: liblinear
  sweep:
    class_weight:
      - balanced
      - {0: 4, 1: 1}
      - {0: 1, 1: 4}
      - {0: 5, 1: 1}
      - {0: 1, 1: 5}
      - {0: 7, 1: 1}
      - {0: 1, 1: 7}
      - {0: 9, 1: 1}
      - {0: 1, 1: 9}
      - {0: 14, 1: 1}
      - {0: 1, 1: 14}
    C: [0.1, 1.0, 10.0]
    penalty: [l2, l1]

xgb_classifier:
  base:
    n_estimators: 100
    random_state: 42
    n_jobs: -1
    eval_metric: logloss
  sweep:
    scale_pos_weight: [0.07, 0.15, 0.3, 0.5, 4, 8, 14]
    max_depth: [3, 6]
    learning_rate: [0.05, 0.1]

one_class_svm:
  base:
    kernel: rbf
  sweep:
    nu: [0.05, 0.1, 0.2]
    gamma: [0.01, 0.1, scale, auto]

isolation_forest:
  base:
    random_state: 42
    n_jobs: -1
  sweep:
    contamination: [0.05, 0.1, 0.2]
    n_estimators: [50, 100, 200]

local_outlier_factor:
  base:
    novelty: true
  sweep:
    n_neighbors: [10, 20, 40]
    contamination: [0.05, 0.1, 0.2]

elliptic_envelope:
  base:
    random_state: 42
  sweep:
    contamination: [0.05, 0.1, 0.2]
    support_fraction: [0.7, 0.8, 0.9]
